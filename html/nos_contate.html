<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nos contate!</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="header-principal">
        <!-- links para navegar -->
        <nav class="nav-menu">
            <a class="nav-link" href="/index.html">Home</a>
            <a class="nav-link" href="/html/sobre_mim.html">Sobre nós</a>
            <a class="nav-link" href="/html/curriculo.html">Nosso currículo</a>
        </nav>
    </header>
    
    <main class="secao-apresentacao">
        <section class="apresentacao-bloco">
            <h1 class="apresentacao-titulo">Vamos tirar sua ideia do papel? <strong class="destaque-cor">Nos contate agora!</strong></h1>
            <p class="apresentacao-paragrafo">Preencha os campos abaixo e nossa equipe entrará em contato para transformar o posicionamento digital do seu negócio.</p>
            
            <form action="#" method="POST" class="formulario-contato">
                <div class="formulario-grupo">
                    <label for="nome" class="formulario-label">Nome:</label>
                    <input type="text" id="nome" name="nome" required placeholder="Digite seu nome completo" class="formulario-input">
                </div>
                <div class="formulario-grupo">
                    <label for="email" class="formulario-label">E-mail:</label>
                    <input type="email" id="email" name="email" required placeholder="seuemail@exemplo.com" class="formulario-input">
                </div>
                <div class="formulario-grupo">
                    <label for="telefone" class="formulario-label">Número de Telefone:</label>
                    <input type="tel" id="telefone" name="telefone" required placeholder="(00) 00000-0000" class="formulario-input">
                </div>
                <button type="submit" class="botao-link botao-formulario">
                    Enviar Solicitação
                </button>
                
            </form>
        </section>
    </main>    
    
    <footer class="footer-principal">
        <p>Desenvolvido por Isaac Borges, Leonardo José e Paulo Gabriel</p>
    </footer>
</body>
</html>
